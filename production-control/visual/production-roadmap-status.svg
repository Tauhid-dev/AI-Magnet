<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1150" viewBox="0 0 1600 1150" role="img" aria-labelledby="title desc">
  <title id="title">AI-Magnet Production Readiness Roadmap</title>
  <desc id="desc">Production readiness phase status from PR-00 to PR-12A with launch gates and critical blockers.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
