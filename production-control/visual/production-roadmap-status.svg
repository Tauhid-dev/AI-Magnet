<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1320" viewBox="0 0 1500 1320" role="img" aria-labelledby="title desc">
  <title id="title">AI-Magnet Production Readiness Roadmap After PR-14A</title>
  <desc id="desc">Production roadmap showing PR-00 through PR-14B. PR-14A staging framework is prepared, PR-14B external staging execution remains pending, and public production remains NO-GO.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
      .verified { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
      .audit { fill: #ffedd5; stroke: #c2410c; stroke-width: 2; }
      .pending { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; }
      .gate { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 18px Arial, sans-serif; fill: #475569; }
      .h { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .t { font: 13px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .badge { font: 700 11px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #64748b; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
      .no { fill: #b91c1c; }
      .ok { fill: #15803d; }
      .warn { fill: #c2410c; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" width="1500" height="1320" />
  <text class="title" x="56" y="54">AI-Magnet Production Readiness Roadmap</text>
  <text class="subtitle" x="56" y="84">After PR-14A: staging deployment framework prepared. Public production remains NO-GO pending PR-14B evidence and owner approval.</text>
  <text class="small" x="56" y="110">Source: production-control/status/production-status.json. Next action: PR-14B owner-approved staging execution with synthetic data only.</text>

  <rect class="panel" x="56" y="132" width="1388" height="68" rx="9" />
  <rect class="verified" x="82" y="154" width="24" height="24" rx="3" />
  <text class="small" x="116" y="171">verified repository phase</text>
  <rect class="audit" x="300" y="154" width="24" height="24" rx="3" />
  <text class="small" x="334" y="171">audit/history gate</text>
  <rect class="pending" x="500" y="154" width="24" height="24" rx="3" />
  <text class="small" x="534" y="171">pending owner execution</text>
  <rect class="gate" x="760" y="154" width="24" height="24" rx="3" />
  <text class="small" x="794" y="171">launch gate blocked</text>
  <text class="small" x="1030" y="171">Internal demo: GO WITH CONDITIONS. Real customer, paid beta and public launch: NO-GO.</text>

  <g id="phase-row-1">
    <rect class="verified" x="56" y="250" width="160" height="84" rx="10" />
    <text class="h" x="74" y="278">PR-00</text><text class="t" x="74" y="303">Roadmap and memory</text><rect class="ok" x="74" y="312" width="64" height="18" rx="4" /><text class="badge" x="86" y="326">verified</text>
    <rect class="verified" x="246" y="250" width="160" height="84" rx="10" />
    <text class="h" x="264" y="278">PR-01</text><text class="t" x="264" y="303">Auth/sessions</text><rect class="ok" x="264" y="312" width="64" height="18" rx="4" /><text class="badge" x="276" y="326">verified</text>
    <rect class="verified" x="436" y="250" width="160" height="84" rx="10" />
    <text class="h" x="454" y="278">PR-02</text><text class="t" x="454" y="303">Abuse controls</text><rect class="ok" x="454" y="312" width="64" height="18" rx="4" /><text class="badge" x="466" y="326">verified</text>
    <rect class="verified" x="626" y="250" width="160" height="84" rx="10" />
    <text class="h" x="644" y="278">PR-03</text><text class="t" x="644" y="303">Tenant privacy DB</text><rect class="ok" x="644" y="312" width="64" height="18" rx="4" /><text class="badge" x="656" y="326">verified</text>
    <rect class="verified" x="816" y="250" width="180" height="84" rx="10" />
    <text class="h" x="834" y="278">PR-04</text><text class="t" x="834" y="303">TLS/private services</text><rect class="ok" x="834" y="312" width="64" height="18" rx="4" /><text class="badge" x="846" y="326">verified</text>
    <rect class="verified" x="1026" y="250" width="190" height="84" rx="10" />
    <text class="h" x="1044" y="278">PR-05</text><text class="t" x="1044" y="303">Worker queue</text><text class="t" x="1044" y="322">PR-13A claim fix</text>
  </g>
  <path class="arrow" d="M216 292 H246" /><path class="arrow" d="M406 292 H436" /><path class="arrow" d="M596 292 H626" /><path class="arrow" d="M786 292 H816" /><path class="arrow" d="M996 292 H1026" />

  <g id="phase-row-2">
    <rect class="verified" x="170" y="430" width="200" height="94" rx="10" />
    <text class="h" x="188" y="460">PR-06</text><text class="t" x="188" y="485">Website/sitemap</text><rect class="ok" x="188" y="498" width="64" height="18" rx="4" /><text class="badge" x="200" y="512">verified</text>
    <rect class="verified" x="170" y="560" width="200" height="94" rx="10" />
    <text class="h" x="188" y="590">PR-07</text><text class="t" x="188" y="615">PDF/DOCX docs</text><rect class="ok" x="188" y="628" width="64" height="18" rx="4" /><text class="badge" x="200" y="642">verified</text>
    <rect class="verified" x="480" y="495" width="200" height="94" rx="10" />
    <text class="h" x="498" y="525">PR-08</text><text class="t" x="498" y="550">pgvector RAG</text><rect class="ok" x="498" y="563" width="64" height="18" rx="4" /><text class="badge" x="510" y="577">verified</text>
    <rect class="verified" x="790" y="495" width="220" height="94" rx="10" />
    <text class="h" x="808" y="525">PR-09</text><text class="t" x="808" y="550">Onboarding/widget UX</text><text class="t" x="808" y="572">Mocked Playwright E2E</text>
    <rect class="verified" x="1120" y="495" width="230" height="94" rx="10" />
    <text class="h" x="1138" y="525">PR-10</text><text class="t" x="1138" y="550">Monitoring/quotas</text><text class="t" x="1138" y="572">Rate-limit events</text>
  </g>
  <path class="arrow" d="M1121 334 V477 H370" /><path class="arrow" d="M370 477 H480 V542" /><path class="arrow" d="M370 607 H480 V542" /><path class="arrow" d="M680 542 H790" /><path class="arrow" d="M1010 542 H1120" />

  <g id="phase-row-3">
    <rect class="verified" x="150" y="745" width="200" height="90" rx="10" />
    <text class="h" x="168" y="775">PR-11</text><text class="t" x="168" y="800">Billing controls</text><rect class="ok" x="168" y="812" width="64" height="18" rx="4" /><text class="badge" x="180" y="826">verified</text>
    <rect class="verified" x="430" y="745" width="200" height="90" rx="10" />
    <text class="h" x="448" y="775">PR-12</text><text class="t" x="448" y="800">Launch package</text><rect class="ok" x="448" y="812" width="64" height="18" rx="4" /><text class="badge" x="460" y="826">verified</text>
    <rect class="verified" x="710" y="745" width="210" height="90" rx="10" />
    <text class="h" x="728" y="775">PR-12A</text><text class="t" x="728" y="800">MFA + Redis limiter</text><rect class="ok" x="728" y="812" width="64" height="18" rx="4" /><text class="badge" x="740" y="826">verified</text>
    <rect class="audit" x="1000" y="745" width="210" height="90" rx="10" />
    <text class="h" x="1018" y="775">PR-13</text><text class="t" x="1018" y="800">Post-merge audit</text><text class="t" x="1018" y="821">Findings closed by PR-13A</text>
    <rect class="verified" x="1260" y="745" width="210" height="90" rx="10" />
    <text class="h" x="1278" y="775">PR-13A</text><text class="t" x="1278" y="800">Repository remediation</text><rect class="ok" x="1278" y="812" width="64" height="18" rx="4" /><text class="badge" x="1290" y="826">verified</text>
  </g>
  <path class="arrow" d="M1235 589 V790 H350" /><path class="arrow" d="M350 790 H430" /><path class="arrow" d="M630 790 H710" /><path class="arrow" d="M920 790 H1000" /><path class="arrow" d="M1210 790 H1260" />

  <g id="phase-row-4">
    <rect class="pending" x="370" y="930" width="250" height="98" rx="10" />
    <text class="h" x="388" y="960">PR-14</text><text class="t" x="388" y="985">External validation umbrella</text><text class="t" x="388" y="1007">Split into PR-14A/PR-14B</text>
    <rect class="verified" x="690" y="930" width="250" height="98" rx="10" />
    <text class="h" x="708" y="960">PR-14A</text><text class="t" x="708" y="985">GitHub Actions staging framework</text><text class="t" x="708" y="1007">No live deployment</text>
