    <text class="h" x="1028" y="960">PR-14B</text><text class="t" x="1028" y="985">Owner-approved staging execution</text><text class="t" x="1028" y="1007">Secrets + manual approval pending</text>
  </g>
  <path class="arrow" d="M1365 835 V890 H495 V930" /><path class="arrow" d="M620 979 H690" /><path class="arrow" d="M940 979 H1010" />

  <g id="gates">
    <rect class="gate" x="56" y="1130" width="250" height="78" rx="10" />
    <text class="h" x="74" y="1158">Gate A</text><text class="t" x="74" y="1182">Internal demo: GO WITH CONDITIONS</text><text class="t" x="74" y="1201">Synthetic/sample data only</text>
    <rect class="gate" x="336" y="1130" width="250" height="78" rx="10" />
    <text class="h" x="354" y="1158">Gate B</text><text class="t" x="354" y="1182">Private demo: CONDITIONAL</text><text class="t" x="354" y="1201">PR-14B VPS evidence pending</text>
    <rect class="gate" x="616" y="1130" width="250" height="78" rx="10" />
    <text class="h" x="634" y="1158">Gate C</text><text class="t" x="634" y="1182">Real customer pilot: NO-GO</text><text class="t" x="634" y="1201">Synthetic staging proof first</text>
    <rect class="gate" x="896" y="1130" width="250" height="78" rx="10" />
    <text class="h" x="914" y="1158">Gate D</text><text class="t" x="914" y="1182">Paid beta: NO-GO</text><text class="t" x="914" y="1201">Owner commercial approval needed</text>
    <rect class="gate" x="1176" y="1130" width="270" height="78" rx="10" />
    <text class="h" x="1194" y="1158">Gate E</text><text class="t" x="1194" y="1182">Public production: NO-GO</text><text class="t" x="1194" y="1201">Live evidence + owner approval</text>
  </g>
  <path class="arrow" d="M1145 1028 V1080 H1311 V1130" />

  <text class="small" x="56" y="1260">PR-14A only prepares the workflow and scripts. It does not deploy, issue certificates, use real customer data, activate payments, or change launch status.</text>
  <text class="small" x="56" y="1286">PR-14B must capture owner-approved staging evidence before any real customer, paid beta or public production gate can change.</text>
</svg>
