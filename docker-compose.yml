x-backend-environment: &backend-environment
  APP_NAME: ${APP_NAME:-AI Tradie Receptionist API}
  APP_VERSION: ${APP_VERSION:-0.1.0}
  APP_ENV: ${APP_ENV:-local}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
  ENABLE_API_DOCS: ${ENABLE_API_DOCS:-true}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
  BUSINESS_PORTAL_SESSION_SECRET: ${BUSINESS_PORTAL_SESSION_SECRET:-change-me-local-business-portal-secret}
  BUSINESS_PORTAL_SESSION_TTL_MINUTES: ${BUSINESS_PORTAL_SESSION_TTL_MINUTES:-480}
  ADMIN_PORTAL_SESSION_SECRET: ${ADMIN_PORTAL_SESSION_SECRET:-change-me-local-admin-portal-secret}
  ADMIN_PORTAL_SESSION_TTL_MINUTES: ${ADMIN_PORTAL_SESSION_TTL_MINUTES:-240}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ai_tradie:ai_tradie@postgres:5432/ai_tradie}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME:-default}
  WORKER_REDIS_QUEUE_KEY: ${WORKER_REDIS_QUEUE_KEY:-ai-magnet:jobs:default}
  WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
  WORKER_HEARTBEAT_INTERVAL_SECONDS: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-15}
  WORKER_JOB_LOCK_TIMEOUT_SECONDS: ${WORKER_JOB_LOCK_TIMEOUT_SECONDS:-900}
  WORKER_DEFAULT_MAX_ATTEMPTS: ${WORKER_DEFAULT_MAX_ATTEMPTS:-3}
  WORKER_RETRY_BASE_SECONDS: ${WORKER_RETRY_BASE_SECONDS:-30}
  WORKER_RETRY_MAX_SECONDS: ${WORKER_RETRY_MAX_SECONDS:-300}
  AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
  AI_API_BASE_URL: ${AI_API_BASE_URL:-https://api.openai.com/v1}
  AI_API_KEY: ${AI_API_KEY:-}
  AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-3-small}
  AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4.1-mini}
  AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-1536}
  RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-700}
  RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-100}
  RAG_TOP_K: ${RAG_TOP_K:-5}
  WEBSITE_CRAWL_USER_AGENT: ${WEBSITE_CRAWL_USER_AGENT:-AI-MagnetBot/0.1 (+https://example.com/ai-magnet-bot)}
  WEBSITE_CRAWL_TIMEOUT_SECONDS: ${WEBSITE_CRAWL_TIMEOUT_SECONDS:-10}
  WEBSITE_CRAWL_MAX_PAGES: ${WEBSITE_CRAWL_MAX_PAGES:-10}
  WEBSITE_CRAWL_MAX_DEPTH: ${WEBSITE_CRAWL_MAX_DEPTH:-1}
  WEBSITE_CRAWL_MAX_BYTES: ${WEBSITE_CRAWL_MAX_BYTES:-1048576}
  WEBSITE_CRAWL_MAX_REDIRECTS: ${WEBSITE_CRAWL_MAX_REDIRECTS:-5}
  WEBSITE_CRAWL_RESPECT_ROBOTS: ${WEBSITE_CRAWL_RESPECT_ROBOTS:-true}
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
  SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
  SMTP_STARTTLS: ${SMTP_STARTTLS:-true}

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-environment
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.workers.runner"]
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.workers.healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_tradie}
      POSTGRES_USER: ${POSTGRES_USER:-ai_tradie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_tradie}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_tradie} -d ${POSTGRES_DB:-ai_tradie}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  frontend_node_modules:
