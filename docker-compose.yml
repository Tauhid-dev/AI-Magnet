services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-AI Tradie Receptionist API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      BUSINESS_PORTAL_SESSION_SECRET: ${BUSINESS_PORTAL_SESSION_SECRET:-change-me-local-business-portal-secret}
      BUSINESS_PORTAL_SESSION_TTL_MINUTES: ${BUSINESS_PORTAL_SESSION_TTL_MINUTES:-480}
      ADMIN_PORTAL_SESSION_SECRET: ${ADMIN_PORTAL_SESSION_SECRET:-change-me-local-admin-portal-secret}
      ADMIN_PORTAL_SESSION_TTL_MINUTES: ${ADMIN_PORTAL_SESSION_TTL_MINUTES:-240}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ai_tradie:ai_tradie@postgres:5432/ai_tradie}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AI_PROVIDER: ${AI_PROVIDER:-openai-compatible}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-3-small}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4.1-mini}
      AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-1536}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-700}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-100}
      RAG_TOP_K: ${RAG_TOP_K:-5}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_tradie}
      POSTGRES_USER: ${POSTGRES_USER:-ai_tradie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_tradie}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_tradie} -d ${POSTGRES_DB:-ai_tradie}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  postgres_data:
  frontend_node_modules:
