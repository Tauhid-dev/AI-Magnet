name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
      - "feature/**"
      - "production/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Compile backend modules
        run: python -m compileall backend/app backend/tests backend/migrations

      - name: Lint backend
        run: python -m ruff check backend/app backend/tests

      - name: Run backend tests
        run: python -m pytest backend/tests

      - name: Validate Alembic migrations with SQLite
        env:
          PYTHONPATH: backend
          DATABASE_URL: sqlite:////tmp/ai_magnet_ci.sqlite
        run: python -m alembic -c backend/alembic.ini upgrade head

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run frontend browser E2E
        run: npm run test:e2e

      - name: Build frontend
        run: npm run build

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Validate production Docker Compose configuration
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml config

      - name: Verify production compose does not publish database services
        run: |
          docker compose --env-file .env.production.example -f docker-compose.prod.yml config > /tmp/ai-magnet-prod-compose.yml
          if grep -A12 '^  postgres:' /tmp/ai-magnet-prod-compose.yml | grep -q 'published:'; then
            echo "PostgreSQL must not publish a host port in production compose."
            exit 1
          fi
          if grep -A12 '^  redis:' /tmp/ai-magnet-prod-compose.yml | grep -q 'published:'; then
            echo "Redis must not publish a host port in production compose."
            exit 1
          fi

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python security scanners
        run: python -m pip install pip-audit bandit

      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Static security scan backend
        run: python -m bandit -q -r backend/app

      - name: Secret pattern scan
        run: |
          if git grep -n -E '(sk-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY|xox[baprs]-[A-Za-z0-9-]{20,})' -- ':!docs/audit/**' ':!frontend/package-lock.json'; then
            echo "Potential committed secret found."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
