name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
      - "feature/**"

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Compile backend modules
        run: python -m compileall backend/app backend/tests backend/migrations

      - name: Lint backend
        run: python -m ruff check backend/app backend/tests

      - name: Run backend tests
        run: python -m pytest backend/tests

      - name: Validate Alembic migrations with SQLite
        env:
          PYTHONPATH: backend
          DATABASE_URL: sqlite:////tmp/ai_magnet_ci.sqlite
        run: python -m alembic -c backend/alembic.ini upgrade head

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config
